spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/db_sitesafe?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=false&useSSL=false}
    username: ${DB_USERNAME:sitesafe_app}
    password: ${DB_PASSWORD:REPLACE_WITH_A_STRONG_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-mysql.sql
      encoding: UTF-8
      continue-on-error: false

app:
  demo-data-enabled: ${DEMO_DATA_ENABLED:false}
